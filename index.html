<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="NexTest – AI-powered QA test case generation and automation platform. Generate structured test cases from product requirements." />
    <link rel="icon" type="image/svg+xml" href="/logo/logo-mark-mono.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/logo-mark-mono.svg" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/logo-mark-mono.svg" />
    <link rel="apple-touch-icon" href="/logo/logo-mark-mono.svg" />
    <meta name="theme-color" content="#080b14" />
    <meta name="color-scheme" content="dark light" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>NexTest — AI-Powered QA Automation</title>
    <script>
      (function(){var t=localStorage.getItem("qacopilot_theme");if(!t){t=window.matchMedia("(prefers-color-scheme: light)").matches?"light":"dark"}document.documentElement.dataset.theme=t;document.documentElement.style.colorScheme=t})()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
